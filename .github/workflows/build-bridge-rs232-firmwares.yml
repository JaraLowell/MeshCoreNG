name: Build RS232 Bridge Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'bridge-rs232-*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
        run: /usr/bin/env bash build.sh build-bridge-rs232-firmwares

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-rs232-firmwares
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: RS232 Bridge Firmware ${{ env.GIT_TAG_VERSION }}
          body: ""
          draft: true
          files: out/*
