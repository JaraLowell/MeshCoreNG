name: PR Build Check

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'variants/**'
      - 'platformio.ini'
      - '.github/workflows/pr-build-check.yml'
      - '.github/workflows/build-bridge-espnow-firmwares.yml'
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'variants/**'
      - 'platformio.ini'
      - '.github/workflows/pr-build-check.yml'
      - '.github/workflows/build-bridge-espnow-firmwares.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          # ESP32-S3 (most common platform)
          - Heltec_v3_companion_radio_ble
          - Heltec_v3_repeater
          - Heltec_v3_repeater_bridge_espnow
          - Heltec_v3_room_server
          # nRF52
          - RAK_4631_companion_radio_ble
          - RAK_4631_repeater
          - RAK_4631_room_server
          # RP2040
          - PicoW_repeater
          # STM32
          - wio-e5-mini_repeater
          # ESP32-C6
          - LilyGo_Tlora_C6_repeater_
          # LR1110 (nRF52)
          - wio_wm1110_repeater
          # SX1276 (ESP32)
          - Tbeam_SX1276_repeater
          - LilyGo_T3S3_sx1276_repeater
          # Newly synced variants
          - Heltec_t1_repeater
          - Heltec_t1_repeater_bridge_ble
          - LilyGo_T_Impulse_Plus_repeater
          - LilyGo_T_Impulse_Plus_repeater_bridge_ble
          - LilyGo_T_Impulse_Plus_repeater_bridge_rs232
          - LilyGo_T-Echo_Card_repeater
          - LilyGo_T-Echo_Card_repeater_bridge_ble
          - LilyGo_T-Echo_Card_repeater_bridge_rs232
          - Station_G3_ESP32_repeater
          - Station_G3_ESP32_repeater_bridge_espnow
          - Station_G3_ESP32_repeater_bridge_tcp
          - Station_G3_ESP32_repeater_bridge_ble
          - Station_G3_ESP32_repeater_bridge_tcp_ble
          - Xiao_S3_repeater
          - Xiao_S3_repeater_bridge_espnow
          - Xiao_S3_repeater_bridge_tcp
          - Xiao_S3_repeater_bridge_ble
          - Xiao_S3_repeater_bridge_tcp_ble

    steps:
      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build ${{ matrix.environment }}
        run: pio run -e ${{ matrix.environment }}
