name: Build BLE Bridge Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      region_profile:
        description: Region profile to compile into fresh repeater installs
        required: false
        default: nl
        type: choice
        options:
          - nl
          - de
          - border
          - none
  push:
    tags:
      - 'bridge-ble-*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
          REGION_PROFILE: ${{ github.event.inputs.region_profile || 'nl' }}
        run: /usr/bin/env bash build.sh build-bridge-ble-firmwares

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-ble-firmwares-${{ github.event.inputs.region_profile || 'nl' }}
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: BLE Bridge Firmware ${{ env.GIT_TAG_VERSION }}
          body: ""
          draft: true
          files: out/*
