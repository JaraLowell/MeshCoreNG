name: Build website and deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Build Companion Firmwares
      - Build Repeater Firmwares
      - Build Room Server Firmwares
      - Build TCP Bridge Firmwares
      - Build RS232 Bridge Firmwares
      - Build ESPNow Bridge Firmwares
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  github-pages:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install VitePress
        working-directory: website
        run: npm install

      - name: Build VitePress site
        working-directory: website
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build web flasher firmware manifests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 tools/build_webflasher.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./website/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
