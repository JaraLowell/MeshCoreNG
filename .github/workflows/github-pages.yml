name: Build Web Flasher from Release and deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: github-pages-flasher
  cancel-in-progress: false

jobs:
  github-pages:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Select firmware release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            RELEASE_TAG="latest"
          fi
          echo "WEBFLASHER_RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"

      - name: Setup Docs Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Docs
        run: |
          pip install mkdocs-material
          mkdocs build

      - name: Build Web Flasher from Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBFLASHER_RELEASE_TAG: ${{ env.WEBFLASHER_RELEASE_TAG }}
        run: python3 tools/build_webflasher.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: 'gh-pages'
