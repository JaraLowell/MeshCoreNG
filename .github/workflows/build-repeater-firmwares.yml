name: Build Repeater Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      region_profile:
        description: Region profile to compile into fresh repeater installs
        required: false
        default: nl
        type: choice
        options:
          - nl
          - de
          - border
          - none
  push:
    tags:
      - 'repeater-*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
          REGION_PROFILE: ${{ github.event.inputs.region_profile || 'nl' }}
        run: /usr/bin/env bash build.sh build-repeater-firmwares

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: repeater-firmwares-${{ github.event.inputs.region_profile || 'nl' }}
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Repeater Firmware ${{ env.GIT_TAG_VERSION }}
          body: ""
          draft: false
          files: out/*
